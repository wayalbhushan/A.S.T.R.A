services:
  db:
    image: postgres:16-alpine
    container_name: astra_db
    environment:
      POSTGRES_DB: astra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: astra_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: astra_backend
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    env_file:
      - .env
    command: python run.py
    restart: unless-stopped

  celery_worker:
    build: ./backend
    container_name: astra_celery_worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    env_file:
      - .env
    command: celery -A celery_worker.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
